name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate API clients
        run: npm run generate:client
        working-directory: packages/canopycms

      - name: Check generated files are committed
        run: |
          if [ -n "$(git status --porcelain packages/canopycms/src/api/client.ts packages/canopycms/src/api/__test__/mock-client.ts)" ]; then
            echo "❌ Generated files are out of sync!"
            echo ""
            echo "Run 'npm run generate:client' in packages/canopycms and commit the changes."
            echo ""
            echo "Changes detected:"
            git diff packages/canopycms/src/api/client.ts
            git diff packages/canopycms/src/api/__test__/mock-client.ts
            exit 1
          fi
          echo "✅ Generated files are up to date"

      - name: TypeScript type checking
        run: npm run typecheck

      - name: Run tests
        working-directory: packages/canopycms
        run: |
          git config --global user.email "ci@canopycms.test"
          git config --global user.name "CI Bot"
          npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config --global user.email "ci@canopycms.test"
          git config --global user.name "CI Bot"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14
