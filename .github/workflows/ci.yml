name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API clients
        run: pnpm run generate:client
        working-directory: packages/canopycms

      - name: Check generated files are committed
        run: |
          if [ -n "$(git status --porcelain packages/canopycms/src/api/client.ts packages/canopycms/src/api/__test__/mock-client.ts)" ]; then
            echo "❌ Generated files are out of sync!"
            echo ""
            echo "Run 'pnpm run generate:client' in packages/canopycms and commit the changes."
            echo ""
            echo "Changes detected:"
            git diff packages/canopycms/src/api/client.ts
            git diff packages/canopycms/src/api/__test__/mock-client.ts
            exit 1
          fi
          echo "✅ Generated files are up to date"

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Format check (Prettier)
        run: pnpm exec prettier --check .

      - name: TypeScript type checking
        run: pnpm typecheck

      - name: Build
        run: pnpm run build
        working-directory: packages/canopycms

      - name: Run tests
        working-directory: packages/canopycms
        env:
          BROWSERSLIST_IGNORE_OLD_DATA: true
        run: |
          git config --global user.email "ci@canopycms.test"
          git config --global user.name "CI Bot"
          pnpm test

  e2e:
    name: E2E Tests
    if: false # temporarily disabled while stabilizing tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config --global user.email "ci@canopycms.test"
          git config --global user.name "CI Bot"

      - name: Ensure local main branch exists
        run: git branch main origin/main 2>/dev/null || true

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14
